name: Deploy Frontend Dev Branch to Vercel

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Test
        run: npm test

      - name: 🛠️ Build frontend
        run: npm run build

      - name: 🚀 Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v41.1.4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--yes'
          github-comment: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: 👀 Comment Vercel Preview URL on PR
        if: github.event_name == 'pull_request' && steps.vercel.outputs.preview-url != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🚀 Vercel Preview Deployment  
            Preview URL: ${{ steps.vercel.outputs.preview-url }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
