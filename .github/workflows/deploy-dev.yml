name: Deploy Dev Branch to Vercel (Preview Alias)

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Test
        run: npm test

      - name: 🛠️ Build
        run: npm run build

      - name: 🚀 Deploy dev branch to Vercel (preview)
        id: vercel
        uses: amondnet/vercel-action@v41.1.4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--confirm'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: 🔗 Set stable dev alias
        run: |
          DEPLOY_URL="${{ steps.vercel.outputs.preview-url }}"
          echo "Deployment URL: $DEPLOY_URL"

          npx vercel alias set "$DEPLOY_URL" dev-smart-shopper.emilyparkes-projects.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
          